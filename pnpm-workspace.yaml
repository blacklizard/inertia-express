packages:
  - "packages/*"
  - "examples/*"
  - "docs"
allowBuilds:
  esbuild: true
  unrs-resolver: true
  vue-demi: true
# Centralized dependency versions. Workspace packages reference these with
# the `catalog:` protocol so a version is declared once and stays uniform.
catalog:
  "@inertiajs/core": ^3.2.0
  "@inertiajs/vite": ^3.2.0
  "@inertiajs/vue3": ^3.2.0
  "@types/express": ^5.0.6
  "@types/node": ^25.9.1
  "@vitejs/plugin-vue": ^6.0.7
  concurrently: ^9.2.1
  express: ^5.2.1
  redis: ^5.12.1
  tsdown: ^0.22.0
  tsx: ^4.22.3
  typescript: ^6.0.3
  vite: ^8.0.14
  vitest: ^4.1.7
  vue: ^3.5.34
minimumReleaseAgeExclude:
  - vite@8.0.14
