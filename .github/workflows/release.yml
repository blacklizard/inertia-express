name: Release

# Publishes all public packages to npm when a v* tag is pushed
# (create the tag/release in the GitHub UI, or `git push --tags`).
#
# Auth: npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Each
# package must have this repo + workflow registered as a trusted
# publisher on npmjs.com (package Settings -> Trusted Publisher).
#
# Versioning is done locally with Changesets before tagging:
#   pnpm changeset            # record the change + bump intent
#   pnpm changeset version    # apply bumps + write CHANGELOGs
#   commit, push, then create the matching v* tag.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # OIDC token for npm Trusted Publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # pnpm publishes via OIDC; it skips any package whose version is
      # already on the registry, so re-running a tag is safe.
      - run: pnpm -r publish --access public --no-git-checks
