name: Release

# Publishes all public packages to npm when a v* tag is pushed.
# Requires an NPM_TOKEN repo secret (npm automation token with publish
# rights to the @blacklizard scope).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  # Required for npm provenance (signed, verifiable publish attestation).
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      # pnpm skips any package whose version already exists on the registry,
      # so re-running a tag is safe.
      - run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
