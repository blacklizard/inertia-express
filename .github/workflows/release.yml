name: Release

# Changesets-driven release. On push to main:
#  - pending changesets present  -> opens/updates a "Version Packages" PR
#    (bumps versions + writes CHANGELOGs).
#  - that PR merged              -> publishes the bumped packages to npm.
# Requires an NPM_TOKEN repo secret (npm token with publish rights to
# the @blacklizard scope). GITHUB_TOKEN is provided automatically.

on:
  push:
    branches: [main]

permissions:
  contents: write        # commit version bumps, push tags
  pull-requests: write   # open the Version Packages PR
  id-token: write        # npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: pnpm changeset version && pnpm install --lockfile-only
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
